
{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}

  <meta name="theme-color" content="#0878b8">
  <meta name="application-name" content="PaketHub">
  <meta name="apple-mobile-web-app-title" content="PaketHub">
  <meta name="robots" content="index,follow">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="PaketHub">
  <meta property="og:title" content="{{ page.title }} · PaketHub">
  <meta property="og:description" content="{{ page.meta.description or config.site_description }}">
  <meta property="og:url" content="{{ page.canonical_url }}">
  <meta property="og:image" content="{{ config.site_url }}assets/social-preview.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }} · PaketHub">
  <meta name="twitter:description" content="{{ page.meta.description or config.site_description }}">
  <meta name="twitter:image" content="{{ config.site_url }}assets/social-preview.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "PaketHub",
    "applicationCategory": "DeveloperApplication",
    "operatingSystem": "Home Assistant",
    "description": "{{ config.site_description }}",
    "url": "{{ config.site_url }}",
    "codeRepository": "{{ config.repo_url }}",
    "author": {
      "@type": "Person",
      "name": "Volker Moeltgen"
    }
  }
  </script>
{% endblock %}

{% block announce %}
  <a class="ph4-announcement" href="https://github.com/eifeldj/pakethub/releases">
    <span class="ph4-pulse"></span>
    <strong id="ph4-release-label">Latest PaketHub release</strong>
    <span class="ph4-announcement-arrow">Release notes →</span>
  </a>
{% endblock %}
