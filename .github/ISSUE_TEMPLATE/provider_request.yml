name: Native provider request
description: Propose a carrier for native support
title: "[Provider]: "
labels: ["provider", "enhancement", "triage"]
body:
  - type: input
    attributes:
      label: Carrier
    validations:
      required: true
  - type: input
    attributes:
      label: Country or region
    validations:
      required: true
  - type: textarea
    attributes:
      label: Official public API documentation
      description: Do not provide credentials.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Why this provider is useful
    validations:
      required: true
