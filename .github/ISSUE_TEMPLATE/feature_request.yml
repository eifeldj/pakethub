name: Feature request
description: Suggest an improvement for PaketHub
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: need
    attributes:
      label: User need
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Provider
        - Dashboard card
        - Automation or action
        - Diagnostics
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
