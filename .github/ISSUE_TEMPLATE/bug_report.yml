name: Bug report
description: Report a reproducible PaketHub defect
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Remove API keys, full tracking numbers, addresses and private shipment details.
  - type: input
    attributes:
      label: PaketHub version
    validations:
      required: true
  - type: input
    attributes:
      label: Home Assistant version
    validations:
      required: true
  - type: textarea
    attributes:
      label: Problem and expected behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    attributes:
      label: Redacted logs
      render: text
