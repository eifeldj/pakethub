site_name: PaketHub
site_description: Parcel tracking for Home Assistant
site_author: Volker Moeltgen
site_url: https://eifeldj.github.io/pakethub/
repo_url: https://github.com/eifeldj/pakethub
repo_name: eifeldj/pakethub
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/pakethub-logo.svg
  favicon: assets/pakethub-logo.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: de
          name: Deutsch
          build: true
          nav_translations:
            Home: Startseite
            Getting started: Erste Schritte
            Installation: Installation
            Quick start: Schnellstart
            Configuration: Konfiguration
            Dashboard card: Dashboard-Karte
            Providers: Anbieter
            Diagnostics: Diagnose
            Actions and automations: Aktionen und Automationen
            Troubleshooting: Fehlerbehebung
            Development: Entwicklung

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/eifeldj/pakethub
  generator: false

copyright: Copyright &copy; Volker Moeltgen

nav:
  - Home: index.md
  - Getting started:
      - Installation: installation.md
      - Quick start: quickstart.md
      - Configuration: configuration.md
  - Dashboard card: dashboard-card.md
  - Providers: providers.md
  - Diagnostics: diagnostics.md
  - Actions and automations: actions-and-automations.md
  - Troubleshooting: troubleshooting.md
  - Development: development.md
